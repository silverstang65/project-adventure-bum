<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="Stylesheet" href="back.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 37</title>
</head>
<body>
    <header>
        <div id="healthbar">
            <label for health><img class=symbol src="images/hrt.png">HP</label>
            <progress id="health" value="100" max="100"></progress>
        </div>
        <div id="sanitybar">
            <label for sanity><img class=symbol src="images/brain.png">Sanity</label>
            <progress id="sanity" value="20" max="20"></progress>
        </div>
        </header>

    <section class="container">
    <img id="roomImage" src="" alt="Room" class="rotate0">
        <img src="images/arrow.png" class="arrow" onclick="changeImage()">
    </section>
    
    <audio controls autoplay loop class="autio">
        <source src="backrooms-humming-sound-made-with-Voicemod.mp3" type="audio/mpeg">
      </audio>

</body>
<script src="rooms.js"></script>
</html>
